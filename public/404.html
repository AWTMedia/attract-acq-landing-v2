<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Simple SPA redirect for GitHub Pages + BrowserRouter
      // Redirects /audit → /index.html/audit (React Router handles /audit from there)
      (function() {
        const path = window.location.pathname + window.location.search + window.location.hash;
        // Only redirect if not already at root or index.html
        if (path !== '/' && path !== '/index.html') {
          window.location.replace('/index.html' + path);
        }
      })();
    </script>
    <!-- Optional fallback if JS is disabled -->
    <meta http-equiv="refresh" content="0; url=/">
  </head>
  <body>
    <p>If not redirected, <a href="/">go to home</a></p>
  </body>
</html>
