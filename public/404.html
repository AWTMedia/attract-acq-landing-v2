<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Safe SPA redirect for GitHub Pages + BrowserRouter
    // Matches the logic in index.html to avoid loops
    (function() {
      const originalPath = window.location.pathname + window.location.search + window.location.hash;

      // Already redirected? Clean up and stop
      if (originalPath.startsWith('/index.html')) {
        const cleanPath = originalPath.replace(/^\/index\.html/, '') || '/';
        window.location.replace(cleanPath);
        return;
      }

      // Normal case: redirect to index.html + original path
      window.location.replace('/index.html' + originalPath);
    })();
  </script>
  <!-- Fallback if JS is disabled -->
  <meta http-equiv="refresh" content="0; url=/" />
</head>
<body>
  <p>Redirecting... If nothing happens, <a href="/">go to the home page</a>.</p>
</body>
</html>
